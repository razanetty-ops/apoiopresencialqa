<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Observação de Aula - SEDUC SP</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #bcd4ff;
            --bg: #f4f7f6;
            --white: #ffffff;
            --success: #d4edda;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: var(--white);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        h2 {
            font-size: 1.2rem;
            color: var(--secondary);
            margin-top: 0;
        }

        .header-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
        }

        .field-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            color: #666;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .section {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
            page-break-inside: avoid;
        }

        /* Botões de Categoria */
        .status-container {
            margin: 15px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-status {
            background: #f0f2f5;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 20px;
            border: 1px solid #ddd;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-status:hover { background: #e2e6ea; }
        .btn-status.active {
            background: var(--accent);
            border-color: var(--primary);
            font-weight: bold;
        }

        /* Lista de Frases */
        .lista-frases {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 15px 0;
        }

        .opcao {
            background: #fff;
            border: 1px solid #eee;
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            transition: 0.2s;
        }

        .opcao:hover { background: #f8f9fa; border-color: #ccc; }
        .opcao.selecionado {
            background: var(--success);
            border-color: #c3e6cb;
        }

        /* Área de Texto */
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            font-family: inherit;
            box-sizing: border-box;
            background: #fff;
        }

        /* Botão Flutuante PDF */
        .controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
        }

        .btn-pdf {
            padding: 15px 25px;
            background: #e74c3c;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .btn-pdf:hover { transform: scale(1.05); background: #c0392b; }

        /* Ajustes para o PDF */
        .pdf-text {
            display: none;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
            color: #333;
            background: #fff;
            padding: 10px;
            border: 1px solid #eee;
        }

        @media print {
            .no-print { display: none !important; }
            .container { box-shadow: none; width: 100%; padding: 0; }
            textarea { display: none; }
            .pdf-text { display: block; }
            .section { border: none; border-bottom: 1px solid #eee; }
        }

        @media (max-width: 600px) {
            .lista-frases { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container" id="conteudo">
    <h1>Relatório de Observação de Aula</h1>

    <div class="header-grid">
        <div class="field-group">
            <label>Data da Observação</label>
            <input type="date" id="data">
        </div>
        <div class="field-group">
            <label>Unidade Escolar</label>
            <input id="escola" placeholder="Nome da Escola">
        </div>
        <div class="field-group">
            <label>Professor(a)</label>
            <input id="professor" placeholder="Nome completo">
        </div>
        <div class="field-group">
            <label>Componente Curricular</label>
            <input id="componente" placeholder="Ex: Matemática">
        </div>
        <div class="field-group">
            <label>Turma</label>
            <input id="turma" placeholder="Ex: 9º Ano A">
        </div>
    </div>

    <div id="formulario"></div>
</div>

<div class="controls no-print">
    <button class="btn-pdf" onclick="gerarPDF()">📄 Salvar Relatório em PDF</button>
</div>

<script>
/* BANCO DE DADOS */
const perguntas = [
    {
        titulo: "1. Planejamento e Domínio: Objetivos da Aula",
        banco: {
            explicito: {
                titulo: "Objetivo Explícito",
                frases: ["Professor apresentou os objetivos no quadro no início da aula.", "Docente explicou claramente o que os alunos deveriam aprender.", "Retomou o objetivo durante a explicação para fortalecer o foco.", "Ao final, validou o progresso em relação ao objetivo inicial.", "Questionou os alunos sobre o que estavam aprendendo no momento."]
            },
            implicito: {
                titulo: "Objetivo Implícito",
                frases: ["Atividades alinhadas ao conteúdo, mas sem explicitação direta.", "Sequência didática indicava o objetivo, embora não verbalizado.", "Houve coerência entre explicação e atividade prática.", "O tipo de exercício indicava o foco da aprendizagem esperado."]
            },
            nao: {
                titulo: "Não Evidenciado",
                frases: ["Professor iniciou a aula sem apresentar a finalidade da aprendizagem.", "Não houve clareza sobre o propósito das tarefas propostas.", "Alunos executaram tarefas sem compreender sua finalidade pedagógica."]
            }
        }
    },
    {
        titulo: "2. Uso de Recursos Pedagógicos (Material Digital/Multimídia)",
        banco: {
            alto: {
                titulo: "Domínio e Integração",
                frases: ["Utilizou recursos digitais de forma intencional e fluida.", "Demonstrou domínio técnico da lousa digital e projetor.", "Adaptou o uso dos recursos conforme a necessidade da turma.", "Vídeos e slides serviram como apoio real à construção do conceito."]
            },
            medio: {
                titulo: "Uso Básico/Mecânico",
                frases: ["Utilizou recursos sem ajustes ou personalização para a turma.", "Manteve o roteiro digital mesmo com dificuldades técnicas.", "O recurso foi utilizado, mas com pouca mediação pedagógica."]
            },
            baixo: {
                titulo: "Dificuldade/Desconexão",
                frases: ["Uso de tecnologia sem intencionalidade pedagógica clara.", "Demonstrou dificuldades técnicas que interromperam o fluxo da aula.", "Recurso desconectado do objetivo de aprendizagem."]
            }
        }
    },
    {
        titulo: "3. Mediação e Explicação do Conteúdo",
        banco: {
            alto: {
                titulo: "Segurança e Aprofundamento",
                frases: ["Conduziu explicações com clareza, utilizando exemplos do cotidiano.", "Respondeu prontamente às dúvidas, aprofundando conceitos.", "Utilizou analogias eficazes para facilitar a compreensão.", "Demonstrou alto domínio conceitual e segurança."]
            },
            medio: {
                titulo: "Parcial/Inseguro",
                frases: ["Demonstrou conhecimento, mas hesitou em dúvidas complexas.", "As respostas foram corretas, porém pouco exploradas.", "Manteve a explicação padrão, sem diversificar a estratégia."]
            },
            baixo: {
                titulo: "Superficial/Confuso",
                frases: ["Explicações superficiais que não favoreceram a compreensão.", "Houve erros conceituais ou imprecisões durante a fala.", "Não conseguiu organizar o raciocínio de forma clara para os alunos."]
            }
        }
    },
    {
        titulo: "4. Verificação da Aprendizagem (Check for Understanding)",
        banco: {
            alto: {
                titulo: "Estratégias Diversificadas",
                frases: ["Circulou pela sala monitorando as produções individuais.", "Utilizou a técnica de 'Puxe Mais' para aprofundar respostas.", "Pediu para alunos explicarem o conceito para os colegas.", "Fez perguntas direcionadas para checar a compreensão em tempo real."]
            },
            nao_observado: {
                titulo: "Não Observado",
                frases: ["Não houve momentos claros de checagem de entendimento.", "O professor seguiu a aula sem validar se os alunos acompanhavam.", "Apenas perguntou 'entenderam?', sem exigir evidência de compreensão."]
            }
        }
    }
];

/* LÓGICA DO FORMULÁRIO */
function gerarFormulario() {
    const container = document.getElementById('formulario');
    perguntas.forEach((pergunta, idx) => {
        const section = document.createElement('div');
        section.className = 'section';
        
        let botoesHTML = '';
        for (let tipo in pergunta.banco) {
            botoesHTML += `<button class="btn-status no-print" onclick="toggleCategoria(${idx}, '${tipo}', this)">${pergunta.banco[tipo].titulo}</button>`;
        }

        section.innerHTML = `
            <h2>${pergunta.titulo}</h2>
            <div class="status-container">${botoesHTML}</div>
            <div id="lista-${idx}" class="lista-frases no-print"></div>
            <div style="margin-top:15px;">
                <label style="font-size:12px; font-weight:bold; color:#666;">EVIDÊNCIAS E FEEDBACK:</label>
                <textarea id="texto-${idx}" oninput="syncText(${idx})" placeholder="Selecione as frases acima ou digite aqui..."></textarea>
                <div id="pdf-view-${idx}" class="pdf-text"></div>
            </div>
        `;
        container.appendChild(section);
    });
}

function toggleCategoria(pIdx, tipo, btn) {
    const listaDiv = document.getElementById(`lista-${pIdx}`);
    
    // Se já estiver ativo, fecha
    if (btn.classList.contains('active')) {
        btn.classList.remove('active');
        listaDiv.innerHTML = "";
        return;
    }

    // Limpa outros botões da mesma seção
    btn.parentElement.querySelectorAll('.btn-status').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    // Renderiza frases
    listaDiv.innerHTML = "";
    perguntas[pIdx].banco[tipo].frases.forEach(frase => {
        const opt = document.createElement('div');
        opt.className = 'opcao';
        opt.innerText = frase;
        opt.onclick = () => preencherTexto(pIdx, frase, opt);
        listaDiv.appendChild(opt);
    });
}

function preencherTexto(pIdx, frase, element) {
    const textarea = document.getElementById(`texto-${pIdx}`);
    const bullet = `• ${frase}`;
    
    if (textarea.value.includes(bullet)) {
        textarea.value = textarea.value.replace(bullet + '\n', '').replace(bullet, '').trim();
        element.classList.remove('selecionado');
    } else {
        textarea.value += (textarea.value ? '\n' : '') + bullet;
        element.classList.add('selecionado');
    }
    syncText(pIdx);
}

// Sincroniza textarea com a div visível no PDF
function syncText(idx) {
    const val = document.getElementById(`texto-${idx}`).value;
    document.getElementById(`pdf-view-${idx}`).innerText = val;
}

/* GERAÇÃO DE PDF */
function gerarPDF() {
    const element = document.getElementById('conteudo');
    const professor = document.getElementById('professor').value || "Sem_Nome";
    const data = document.getElementById('data').value;

    const opt = {
        margin: [10, 10, 10, 10],
        filename: `Relatorio_Observacao_${professor}_${data}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
}

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById('data').valueAsDate = new Date();
    gerarFormulario();
});
</script>

</body>
</html>
