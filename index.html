<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Observação de Aula</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#eef;
  margin:0;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:8px;
}

h1,h2{color:#2c3e50}

.section{
  margin-bottom:25px;
}

.header-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

input,textarea{
  width:100%;
  padding:8px;
  margin-top:5px;
}

textarea{
  height:150px;
}

.btn-status{
  background:#e8f0fe;
  padding:10px;
  margin:5px 5px 5px 0;
  display:inline-block;
  cursor:pointer;
  border-radius:5px;
}

.btn-status.active{
  background:#bcd4ff;
}

.opcao{
  background:#f1f1f1;
  margin:5px 0;
  padding:10px;
  cursor:pointer;
  border-radius:4px;
}

.opcao:hover{
  background:#ddd;
}

button{
  margin-top:15px;
  padding:10px;
  background:#2c3e50;
  color:#fff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container" id="conteudo-relatorio">

<h1>Relatório de Observação de Aula</h1>

<div class="header-grid">
<input type="date" id="data">
<input placeholder="Escola" id="escola">
<input placeholder="Professor" id="professor">
<input placeholder="Componente" id="componente">
<input placeholder="Turma" id="turma">
</div>

<div id="formulario"></div>

<div>
<h3>Registro Geral</h3>
<textarea id="texto"></textarea>
</div>

</div>

<button onclick="gerarPDF()">Gerar PDF</button>

<script>

/* ===============================
   DADOS (PERGUNTAS)
================================= */

const perguntas = [

/* ===== PERGUNTA 1 ===== */
{
  titulo: "Planejamento e Domínio: Objetivos da Aula",

  banco: {
    explicito:{
      titulo:"Objetivo ficou explícito ao longo da aula",
      frases:[
        "Professor apresentou os objetivos no quadro no início da aula.",
        "Docente explicou claramente o que os alunos deveriam aprender antes de iniciar a atividade."
      ]
    },

    implicito:{
      titulo:"Objetivo ficou implícito, mas houve coerência",
      frases:[
        "As atividades estavam alinhadas ao conteúdo esperado, mesmo sem explicitação direta."
      ]
    },

    nao:{
      titulo:"Objetivo não ficou evidente",
      frases:[
        "Professor iniciou a aula sem apresentar o que seria aprendido."
      ]
    }
  }
},

/* ===== PERGUNTA 2 ===== */
{
  titulo: "Uso de recursos pedagógicos",

  banco: {

    alto:{
      titulo:"Demonstrou domínio dos recursos, conectando com a metodologia e adaptando quando necessário",
      frases:[
        "O professor utilizou recursos digitais de forma intencional.",
        "Demonstrou domínio no uso da lousa digital.",
        "Adaptou o uso dos recursos conforme a necessidade da turma."
      ]
    },

    medio:{
      titulo:"Demonstrou domínio dos recursos, mas com dificuldade de adaptação",
      frases:[
        "Utilizou adequadamente a plataforma, porém sem ajustes.",
        "Manteve o planejamento mesmo com dificuldades dos alunos."
      ]
    },

    baixo:{
      titulo:"Uso mecanizado ou desconectado do objetivo de aprendizagem",
      frases:[
        "Utilizou recursos sem conexão com o objetivo.",
        "Uso da tecnologia sem intencionalidade pedagógica."
      ]
    }

  }
}

];


/* ===============================
   CONTROLE
================================= */

let estado = {};

/* ===============================
   GERAR FORMULÁRIO
================================= */

function gerarFormulario(){

const container = document.getElementById('formulario');

perguntas.forEach((pergunta, index)=>{

  const div = document.createElement('div');
  div.className = 'section';

  div.innerHTML = `
    <h2>${pergunta.titulo}</h2>

    ${Object.keys(pergunta.banco).map(tipo => `
      <div class="btn-status" onclick="selecionarOpcao(${index}, '${tipo}', this)">
        ${pergunta.banco[tipo].titulo}
      </div>
    `).join('')}

    <div id="lista-${index}"></div>
  `;

  container.appendChild(div);

});

}

/* ===============================
   SELEÇÃO (TOGGLE)
================================= */

function selecionarOpcao(indice, tipo, botao){

const lista = document.getElementById(`lista-${indice}`);
const bancoAtual = perguntas[indice].banco;

/* TOGGLE */
if(estado[indice] === tipo){
  lista.innerHTML = '';
  botao.classList.remove('active');
  estado[indice] = null;
  return;
}

estado[indice] = tipo;

lista.innerHTML = '';

/* limpa botões da mesma seção */
botao.parentElement.querySelectorAll('.btn-status')
.forEach(el => el.classList.remove('active'));

botao.classList.add('active');

/* FRASES */
bancoAtual[tipo].frases.forEach(frase => {

  const div = document.createElement('div');
  div.className = 'opcao';
  div.innerText = frase;

  div.onclick = () => adicionarTexto(frase, div);

  lista.appendChild(div);

});

}

/* ===============================
   ADICIONAR TEXTO
================================= */

function adicionarTexto(frase, elemento){

const campo = document.getElementById('texto');

if(!campo.value.includes(frase)){

  if(campo.value === ''){
    campo.value = '• ' + frase;
  }else{
    campo.value += '\n• ' + frase;
  }

  elemento.style.background = '#d4edda';

  setTimeout(()=>{
    elemento.style.background = '#f1f1f1';
  },300);
}

}

/* ===============================
   PDF
================================= */

function gerarPDF(){

if(typeof html2pdf === "undefined"){
  alert("Erro ao carregar PDF");
  return;
}

const elemento = document.getElementById('conteudo-relatorio');

html2pdf().from(elemento).save();

}

/* ===============================
   INICIAR
================================= */

document.addEventListener("DOMContentLoaded", ()=>{
  document.getElementById('data').valueAsDate = new Date();
  gerarFormulario();
});

</script>

</body>
</html>
