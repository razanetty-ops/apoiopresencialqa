<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Observação de Aula Profissional</title>

<!-- Biblioteca para gerar PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
/* ===== ESTILO GERAL ===== */
body{
  font-family:Arial;
  background:#eef;
  margin:0;
  padding:20px;
}

/* Caixa principal */
.container{
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:8px;
}

/* Títulos */
h1,h2{color:#2c3e50}

/* Layout dos inputs */
.header-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

/* Campos */
input,textarea{
  width:100%;
  padding:8px;
  margin-top:5px;
}

textarea{
  height:120px;
}

/* Botões principais */
.btn-status{
  background:#e8f0fe;
  padding:10px;
  margin:5px;
  cursor:pointer;
  border-radius:5px;
}

/* Botão ativo */
.btn-status.active{
  background:#bcd4ff;
}

/* Opções de frases */
.opcao{
  background:#f1f1f1;
  margin:5px 0;
  padding:10px;
  cursor:pointer;
  border-radius:4px;
}

/* Hover */
.opcao:hover{
  background:#ddd;
}

/* Botão PDF */
button{
  margin-top:15px;
  padding:10px;
  background:#2c3e50;
  color:#fff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container" id="conteudo-relatorio">

<h1>Relatório de Observação de Aula</h1>

<!-- ===== CAMPOS DE IDENTIFICAÇÃO ===== -->
<div class="header-grid">
<input type="date" id="data">
<input placeholder="Escola" id="escola">
<input placeholder="Professor" id="professor">
<input placeholder="Componente" id="componente">
<input placeholder="Turma" id="turma">
</div>

<!-- ===== ÁREA DE SELEÇÃO ===== -->
<div id="area-selecao">

<h2>Planejamento e Domínio: Objetivos da Aula</h2>

<!-- 🔥 ALTERADO: agora os botões não têm texto fixo -->
<div class="btn-status" onclick="selecionarOpcao('explicito', this)" id="btn-explicito"></div>
<div class="btn-status" onclick="selecionarOpcao('implicito', this)" id="btn-implicito"></div>
<div class="btn-status" onclick="selecionarOpcao('nao', this)" id="btn-nao"></div>

<!-- Lista dinâmica -->
<div id="lista"></div>

</div>

<!-- ===== ÁREA DE TEXTO ===== -->
<div>
<h3>Registro</h3>
<textarea id="texto"></textarea>
</div>

</div>

<!-- Botão PDF -->
<button onclick="gerarPDF()">Gerar PDF</button>

================================= */

  document.getElementById('btn-explicito').innerText = banco.explicito.titulo;

/* ===============================
   FUNÇÃO PRINCIPAL
================================= */
function selecionarOpcao(tipo, botao){

const lista = document.getElementById('lista');
const titulo = document.querySelector('#area-selecao h2');

/* 🔥 TOGGLE (abre/fecha) */
if(categoriaAtualAtiva === tipo){
  lista.innerHTML='';
  botao.classList.remove('active');
  categoriaAtualAtiva=null;
  titulo.innerText="Planejamento e Domínio: Objetivos da Aula";
  return;
}

categoriaAtualAtiva=tipo;

lista.innerHTML='';

/* remove destaque dos outros */
document.querySelectorAll('.btn-status')
.forEach(el=>el.classList.remove('active'));

/* destaca atual */
botao.classList.add('active');

/* 🔥 ALTERADO: título dinâmico */
titulo.innerText=banco[tipo].titulo;

/* gera frases */
banco[tipo].frases.forEach(frase=>{

  const div=document.createElement('div');
  div.className='opcao';
  div.innerText=frase;

  /* 🔥 CORREÇÃO IMPORTANTE */
  div.onclick = () => adicionarTexto(frase, div);

  lista.appendChild(div);

});

}

/* ===============================
   ADICIONAR TEXTO
================================= */
function adicionarTexto(frase, elemento){

const campo=document.getElementById('texto');

if(!campo.value.includes(frase)){

  if(campo.value===''){
    campo.value='• '+frase;
  }else{
    campo.value+='\n• '+frase;
  }

  /* feedback visual */
  if(elemento){
    elemento.style.background='#d4edda';

    setTimeout(()=>{
      elemento.style.background='#f1f1f1';
    },300);
  }
}

}

/* ===============================
   GERAR PDF
================================= */
function gerarPDF(){

if(typeof html2pdf === "undefined"){
  alert("Biblioteca PDF não carregada");
  return;
}

const elemento=document.getElementById('conteudo-relatorio');

html2pdf().from(elemento).save();

}

</script>
