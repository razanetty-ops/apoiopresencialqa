<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório de Observação de Aula</title>

https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  background:#eef;
  margin:0;
  padding:20px;
}
.container{
  max-width:1000px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:8px;
}
h1,h2,h3{
  color:#2c3e50;
}
.section{
  margin-bottom:30px;
  padding-bottom:20px;
  border-bottom:1px solid #ccc;
  page-break-inside: avoid;
}
.header-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
  margin-bottom:20px;
}
input, textarea{
  width:100%;
  padding:8px;
  margin-top:5px;
}
textarea{
  height:140px;
  resize:vertical;
}
.btn-status{
  background:#e8f0fe;
  padding:10px;
  margin:6px 6px 6px 0;
  display:inline-block;
  cursor:pointer;
  border-radius:5px;
  font-size:14px;
}
.btn-status.active{
  background:#bcd4ff;
}
.opcao{
  background:#f1f1f1;
  margin:5px 0;
  padding:10px;
  cursor:pointer;
  border-radius:4px;
}
.opcao:hover{
  background:#ddd;
}
button{
  margin-top:25px;
  padding:14px;
  background:#2c3e50;
  color:#fff;
  border:none;
  font-size:16px;
  cursor:pointer;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container" id="conteudo">

<h1>Relatório de Observação de Aula</h1>

<div class="header-grid">
  <input type="date" id="data">
  <input placeholder="Escola">
  <input placeholder="Professor(a)">
  <input placeholder="Componente Curricular">
  <input placeholder="Turma">
  <input placeholder="Observador(a)">
</div>

<div id="formulario"></div>

<h3>Considerações finais / devolutiva</h3>
<textarea placeholder="Síntese da observação, pontos fortes, fragilidades e encaminhamentos."></textarea>

</div>

<button onclick="gerarPDF()">Gerar relatório em PDF</button>

<script>

/* ======================================================
BANCO COMPLETO – EXEMPLO DE UMA DIMENSÃO (20 FRASES)
(As demais seguem exatamente o mesmo padrão)
====================================================== */

const perguntas = [

{
titulo:"Planejamento e domínio: objetivos da aula",
banco:{
alto:{
titulo:"Objetivo ficou explícito ao longo da aula",
frases:[
"Apresentou claramente o objetivo no início da aula.",
"Escreveu o objetivo no quadro de forma acessível.",
"Retomou o objetivo durante a explicação.",
"Relacionou as atividades ao objetivo proposto.",
"Contextualizou o objetivo com situações reais.",
"Explicou o para que aprender o conteúdo.",
"Manteve foco constante no objetivo.",
"Reforçou o objetivo após dúvidas dos alunos.",
"Validou o avanço da aprendizagem em relação ao objetivo.",
"Convidou os alunos a verbalizarem o objetivo.",
"Utilizou perguntas alinhadas ao objetivo.",
"Explicitou as habilidades a serem desenvolvidas.",
"Articulou teoria e prática com base no objetivo.",
"Organizou a aula em etapas ligadas ao objetivo.",
"Realizou síntese final retomando o objetivo.",
"Usou exemplos diretamente conectados ao objetivo.",
"Evidenciou intencionalidade pedagógica clara.",
"Demonstrou planejamento prévio consistente.",
"Manteve coerência entre explicação e atividade.",
"A condução da aula evidenciou foco pedagógico."
]
},

medio:{
titulo:"Objetivo implícito, mas com coerência",
frases:[
"As atividades indicavam o objetivo de aprendizagem.",
"Houve sequência didática coerente.",
"O foco do conteúdo ficou evidente.",
"A correção evidenciou o objetivo da aula.",
"As intervenções indicaram intencionalidade.",
"Houve progressão lógica do conteúdo.",
"Teoria e prática estiveram alinhadas.",
"O tipo de atividade indicou o objetivo.",
"A organização da aula foi coerente.",
"O conteúdo seguiu o planejamento.",
"Os alunos conseguiram acompanhar.",
"A aprendizagem esperada pôde ser inferida.",
"Houve encadeamento entre etapas.",
"O professor manteve foco no conteúdo.",
"As explicações conduziram à aprendizagem.",
"O objetivo ficou claro ao final da aula.",
"As atividades foram adequadas.",
"O conteúdo esteve articulado.",
"A aula foi estruturada.",
"A intencionalidade esteve presente."
]
},

baixo:{
titulo:"Objetivo não ficou evidente",
frases:[
"Não explicitou o objetivo da aula.",
"As atividades não tinham propósito claro.",
"Houve dispersão do conteúdo.",
"As tarefas pareceram desconectadas.",
"Não houve síntese final.",
"Os alunos não compreenderam a finalidade.",
"O conteúdo foi trabalhado de forma solta.",
"Não houve foco definido.",
"As intervenções foram pouco direcionadas.",
"O planejamento não ficou evidente.",
"A aula ocorreu de forma improvisada.",
"Não houve contextualização.",
"O conteúdo não avançou.",
"As explicações foram fragmentadas.",
"Não houve retomada.",
"A aula terminou abruptamente.",
"Faltou clareza de expectativas.",
"O propósito não foi comunicado.",
"A aprendizagem não ficou evidente.",
"A condução foi desorganizada."
]
}
}
}

];

/* ======================================================
GERAÇÃO DO FORMULÁRIO
====================================================== */

let estado = {};

function gerarFormulario(){
  const container = document.getElementById("formulario");
  perguntas.forEach((p,i)=>{
    const div=document.createElement("div");
    div.className="section";
    div.innerHTML=`
      <h2>${p.titulo}</h2>
      ${Object.keys(p.banco).map(tipo=>`
        <div class="btn-status" onclick="selecionarOpcao(${i},'${tipo}',this)">
          ${p.banco[tipo].titulo}
        </div>`).join("")}
      <div id="lista-${i}"></div>
      <h4>Registro da seção</h4>
      <textarea id="texto-${i}"></textarea>
    `;
    container.appendChild(div);
  });
}

function selecionarOpcao(indice,tipo,botao){
  const lista=document.getElementById(`lista-${indice}`);

  // TOGGLE CORRETO
  if(estado[indice]===tipo){
    lista.innerHTML="";
    estado[indice]=null;
    botao.classList.remove("active");
    return;
  }

  estado[indice]=tipo;
  lista.innerHTML="";
  botao.parentElement.querySelectorAll(".btn-status")
    .forEach(b=>b.classList.remove("active"));
  botao.classList.add("active");

  perguntas[indice].banco[tipo].frases.forEach(f=>{
    const d=document.createElement("div");
    d.className="opcao";
    d.innerText=f;
    d.onclick=()=>adicionarTexto(f,indice);
    lista.appendChild(d);
  });
}

function adicionarTexto(frase,indice){
  const campo=document.getElementById(`texto-${indice}`);
  if(!campo.value.includes(frase)){
    campo.value+=(campo.value===""?"":"\n")+"• "+frase;
  }
}

function gerarPDF(){
  html2pdf(document.getElementById("conteudo"),{
    margin:10,
    filename:"Relatorio_Observacao_Aula.pdf",
    html2canvas:{scale:2},
    jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}
  });
}

document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("data").valueAsDate=new Date();
  gerarFormulario();
});
</script>

</body>
</html>
