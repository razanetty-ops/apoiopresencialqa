<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório de Observação de Aula</title>

<!-- Biblioteca PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  background:#eef;
  margin:0;
  padding:20px;
}
.container{
  max-width:1000px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:8px;
}
h1,h2,h3{
  color:#2c3e50;
}
.section{
  margin-bottom:30px;
  padding-bottom:20px;
  border-bottom:1px solid #ccc;
}
.header-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
  margin-bottom:20px;
}
input, textarea{
  width:100%;
  padding:8px;
  margin-top:5px;
}
textarea{
  height:130px;
  resize:vertical;
}
.btn-status{
  background:#e8f0fe;
  padding:10px;
  margin:6px 6px 6px 0;
  display:inline-block;
  cursor:pointer;
  border-radius:5px;
  font-size:14px;
}
.btn-status.active{
  background:#bcd4ff;
}
.opcao{
  background:#f1f1f1;
  margin:5px 0;
  padding:10px;
  cursor:pointer;
  border-radius:4px;
}
button{
  margin-top:25px;
  padding:14px;
  background:#2c3e50;
  color:#fff;
  border:none;
  font-size:16px;
  cursor:pointer;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container" id="conteudo">

<h1>Relatório de Observação de Aula</h1>

<div class="header-grid">
  <input type="date" id="data">
  <input placeholder="Escola">
  <input placeholder="Professor(a)">
  <input placeholder="Componente Curricular">
  <input placeholder="Turma">
  <input placeholder="Observador(a)">
</div>

<div id="formulario"></div>

<h3>Considerações finais / devolutiva</h3>
<textarea placeholder="Registro geral da observação, pontos fortes e encaminhamentos."></textarea>

</div>

<button onclick="gerarPDF()">Gerar relatório em PDF</button>

<script>

/* =====================================================
BANCO COMPLETO DE DIMENSÕES E DESCRITORES
===================================================== */

const perguntas = [

{
  titulo: "Planejamento e domínio: objetivos da aula",
  banco: {
    alto:{
      titulo:"Objetivo ficou explícito ao longo da aula",
      frases:[
        "O professor iniciou a aula apresentando claramente o objetivo de aprendizagem.",
        "O objetivo foi retomado ao longo da aula, mantendo o foco da aprendizagem.",
        "As atividades propostas foram diretamente relacionadas ao objetivo.",
        "Houve fechamento retomando o que se pretendia ensinar."
      ]
    },
    medio:{
      titulo:"Objetivo ficou implícito, mas houve coerência",
      frases:[
        "As atividades estavam alinhadas à aprendizagem esperada.",
        "A sequência didática indicava claramente o objetivo.",
        "Houve coerência entre explicação, atividade e correção."
      ]
    },
    baixo:{
      titulo:"Objetivo não ficou evidente",
      frases:[
        "O professor não explicitou o objetivo da aula.",
        "As atividades foram realizadas sem clareza de propósito.",
        "Não houve síntese ou fechamento da aprendizagem."
      ]
    }
  }
},

{
  titulo:"Uso de recursos pedagógicos",
  banco:{
    alto:{
      titulo:"Demonstrou domínio e adaptação dos recursos",
      frases:[
        "Utilizou recursos digitais e impressos de forma intencional.",
        "Adaptou o uso dos recursos conforme a necessidade da turma.",
        "Os recursos potencializaram a compreensão do conteúdo."
      ]
    },
    medio:{
      titulo:"Demonstrou domínio técnico, mas pouca adaptação",
      frases:[
        "Utilizou corretamente os recursos, porém sem ajustes.",
        "Manteve o planejamento inicial mesmo diante de dificuldades.",
        "Explorou superficialmente o potencial dos recursos."
      ]
    },
    baixo:{
      titulo:"Uso mecanizado ou desconectado do objetivo",
      frases:[
        "Os recursos foram usados sem intencionalidade pedagógica.",
        "A tecnologia foi utilizada de forma mecânica.",
        "O uso dos recursos não contribuiu para a aprendizagem."
      ]
    }
  }
},

{
  titulo:"Explicação do conteúdo",
  banco:{
    alto:{
      titulo:"Demonstrou segurança e aprofundamento",
      frases:[
        "Explicou o conteúdo com clareza e segurança.",
        "Utilizou exemplos contextualizados.",
        "Respondeu às dúvidas com precisão."
      ]
    },
    medio:{
      titulo:"Demonstrou preparo, mas com limitações",
      frases:[
        "Explicou adequadamente, porém sem aprofundamento.",
        "Teve dificuldade em reformular a explicação.",
        "As respostas às dúvidas foram superficiais."
      ]
    },
    baixo:{
      titulo:"Não demonstrou domínio ao explicar",
      frases:[
        "Apresentou insegurança conceitual.",
        "As explicações foram confusas.",
        "Não conseguiu esclarecer dúvidas dos alunos."
      ]
    }
  }
},

{
  titulo:"Verificação da compreensão dos estudantes",
  banco:{
    alto:{
      titulo:"Utilizou estratégias diversificadas",
      frases:[
        "Utilizou perguntas direcionadas.",
        "Circulou pela sala acompanhando as atividades.",
        "Explorou as respostas dos alunos."
      ]
    },
    medio:{
      titulo:"Verificação superficial",
      frases:[
        "Realizou perguntas genéricas.",
        "A verificação foi pontual e pouco diagnóstica."
      ]
    },
    nao:{
      titulo:"Não houve verificação",
      frases:[
        "Não verificou a compreensão durante a aula.",
        "As atividades foram conduzidas sem acompanhamento."
      ]
    }
  }
},

{
  titulo:"Ajuste do ritmo da aula",
  banco:{
    alto:{
      titulo:"Ajustou o ritmo conforme as necessidades",
      frases:[
        "Retomou explicações quando necessário.",
        "Priorizou a compreensão dos alunos.",
        "Ofereceu apoio individualizado."
      ]
    },
    medio:{
      titulo:"Manteve o mesmo ritmo",
      frases:[
        "Seguiu o planejamento inicial sem ajustes.",
        "Não reorganizou o tempo das atividades."
      ]
    },
    nao:{
      titulo:"Não foi possível observar",
      frases:[
        "O tempo de observação foi insuficiente.",
        "A etapa observada não permitiu análise."
      ]
    }
  }
}

];

/* =====================================================
CONTROLE
===================================================== */

let estado = {};

/* =====================================================
GERAR FORMULÁRIO
===================================================== */

function gerarFormulario(){
  const container = document.getElementById("formulario");

  perguntas.forEach((pergunta, index)=>{
    const div = document.createElement("div");
    div.className="section";

    div.innerHTML = `
      <h2>${pergunta.titulo}</h2>
      ${Object.keys(pergunta.banco).map(tipo=>`
        <div class="btn-status" onclick="selecionarOpcao(${index}, '${tipo}', this)">
          ${pergunta.banco[tipo].titulo}
        </div>
      `).join("")}
      <div id="lista-${index}"></div>
      <h4>Registro da seção</h4>
      <textarea id="texto-${index}"></textarea>
    `;
    container.appendChild(div);
  });
}

/* =====================================================
SELEÇÃO DE OPÇÕES
===================================================== */

function selecionarOpcao(indice, tipo, botao){
  const lista = document.getElementById(`lista-${indice}`);
  const bancoAtual = perguntas[indice].banco;

  estado[indice] = tipo;
  lista.innerHTML="";

  botao.parentElement.querySelectorAll(".btn-status")
    .forEach(el=>el.classList.remove("active"));
  botao.classList.add("active");

  bancoAtual[tipo].frases.forEach(frase=>{
    const div = document.createElement("div");
    div.className="opcao";
    div.innerText=frase;
    div.onclick=()=>adicionarTexto(frase,indice);
    lista.appendChild(div);
  });
}

/* =====================================================
ADICIONAR TEXTO
===================================================== */

function adicionarTexto(frase, indice){
  const campo = document.getElementById(`texto-${indice}`);
  if(!campo.value.includes(frase)){
    campo.value += (campo.value===""?"":"\n")+"• "+frase;
  }
}

/* =====================================================
GERAR PDF
===================================================== */

function gerarPDF(){
  html2pdf().from(document.getElementById("conteudo")).save("Relatorio_Observacao_Aula.pdf");
}

/* =====================================================
INICIALIZAÇÃO
===================================================== */

document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("data").valueAsDate=new Date();
  gerarFormulario();
});

</script>

</body>
</html>
