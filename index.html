<style>
/* ===============================
   ESTILO GERAL
================================= */
body{
  font-family:Arial;
  background:#eef;
  margin:0;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:8px;
}

h1,h2{color:#2c3e50}

.section{
  margin-bottom:30px;
  padding-bottom:15px;
  border-bottom:1px solid #ccc
}

.header-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px
}

input,textarea{
  width:100%;
  padding:8px;
  margin-top:5px
}

textarea{height:120px}

/* Botões de nível */
.btn-status{
  background:#e8f0fe;
  padding:10px;
  margin:5px;
  display:inline-block;
  cursor:pointer;
  border-radius:5px;
}

.btn-status.active{background:#bcd4ff}

/* Opções clicáveis */
.opcao{
  background:#f1f1f1;
  margin:5px 0;
  padding:10px;
  cursor:pointer;
  border-radius:4px
}

.opcao:hover{background:#ddd}

/* Botão PDF */
.btn-pdf{
  margin-top:15px;
  padding:12px;
  background:#2c3e50;
  color:#fff;
  border:none;
  cursor:pointer;
  border-radius:6px;
  font-size:16px;
}

/* Não imprimir */
.no-print{
  display:block;
}

@media print{
  .no-print{display:none;}
}
</style>
</head>

/* ===============================
   CONTROLE DE ESTADO
================================= */
let estado = {};

/* ===============================
   GERAR FORMULÁRIO
================================= */
function gerarFormulario(){

const container = document.getElementById('formulario');

perguntas.forEach((pergunta, index)=>{

  const div = document.createElement('div');
  div.className = 'section';

  div.innerHTML = `
    <h2>${pergunta.titulo}</h2>

    ${Object.keys(pergunta.banco).map(tipo => `
      <div class="btn-status no-print" onclick="selecionarOpcao(${index}, '${tipo}', this)">
        ${pergunta.banco[tipo].titulo}
      </div>
    `).join('')}

    <div id="lista-${index}" class="no-print"></div>

    <h4>Registro da seção</h4>
    <textarea id="texto-${index}"></textarea>
  `;

  container.appendChild(div);

});

}

/* ===============================
   SELEÇÃO DE NÍVEL
================================= */
function selecionarOpcao(indice,tipo,botao){

const lista=document.getElementById(`lista-${indice}`);
lista.innerHTML="";

botao.parentElement.querySelectorAll('.btn-status')
.forEach(el=>el.classList.remove('active'));

botao.classList.add('active');

perguntas[indice].banco[tipo].frases.forEach(frase=>{

const div=document.createElement('div');
div.className='opcao';
div.innerText=frase;

div.onclick=()=>adicionarTexto(frase,indice,div);

lista.appendChild(div);

});


}

/* ===============================
   ADICIONAR TEXTO
================================= */
function adicionarTexto(frase, indice, elemento){

const campo = document.getElementById(`texto-${indice}`);

if(!campo.value.includes(frase)){
  campo.value += (campo.value ? '\n' : '') + '• ' + frase;

  elemento.style.background = '#d4edda';
  setTimeout(()=> elemento.style.background='#f1f1f1',300);
}

}

/* ===============================
   GERAR PDF (CORRIGIDO)
================================= */
function gerarPDF(){

const elemento = document.getElementById('conteudo');

const professor = document.getElementById('professor').value || "Professor";
const data = document.getElementById('data').value || "data";

const btn = document.querySelector('.btn-pdf');

btn.innerText="Gerando PDF...";
btn.disabled=true;

html2pdf()
.set({
  margin:10,
  filename:`Relatorio_${professor}_${data}.pdf`,
  html2canvas:{scale:2},
  jsPDF:{unit:'mm',format:'a4'}
})
.from(elemento)
.save()
.then(()=>{
  btn.innerText="📄 Gerar PDF";
  btn.disabled=false;
});

}

/* ===============================
   INICIALIZAÇÃO
================================= */
document.addEventListener("DOMContentLoaded", ()=>{
document.getElementById('data').valueAsDate = new Date();
gerarFormulario();
});
