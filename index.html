/* ===============================
   CONTROLE
================================= */

let estado = {};

/* ===============================
   GERAR FORMULÁRIO
================================= */

function gerarFormulario(){

const container = document.getElementById('formulario');

perguntas.forEach((pergunta, index)=>{

  const div = document.createElement('div');
  div.className = 'section';

  div.innerHTML = `
    <h2>${pergunta.titulo}</h2>

    ${Object.keys(pergunta.banco).map(tipo => `
      <div class="btn-status" onclick="selecionarOpcao(${index}, '${tipo}', this)">
        ${pergunta.banco[tipo].titulo}
      </div>
    `).join('')}

    <div id="lista-${index}"></div>

    <h4>Registro da seção</h4>
    <textarea id="texto-${index}"></textarea>
  `;

  container.appendChild(div);

});

}

/* ===============================
   SELEÇÃO
================================= */

function selecionarOpcao(indice, tipo, botao){

const lista = document.getElementById(`lista-${indice}`);
const bancoAtual = perguntas[indice].banco;

/* toggle */
if(estado[indice] === tipo){
  lista.innerHTML = '';
  botao.classList.remove('active');
  estado[indice] = null;
  return;
}

estado[indice] = tipo;

lista.innerHTML = '';

botao.parentElement.querySelectorAll('.btn-status')
.forEach(el => el.classList.remove('active'));

botao.classList.add('active');

/* frases */
bancoAtual[tipo].frases.forEach(frase => {

  const div = document.createElement('div');
  div.className = 'opcao';
  div.innerText = frase;

  div.onclick = () => adicionarTexto(frase, indice, div);

  lista.appendChild(div);

});

}

/* ===============================
   ADICIONAR TEXTO POR SEÇÃO
================================= */

function adicionarTexto(frase, indice, elemento){

const campo = document.getElementById(`texto-${indice}`);

if(!campo.value.includes(frase)){

  if(campo.value === ''){
    campo.value = '• ' + frase;
  }else{
    campo.value += '\n• ' + frase;
  }

  elemento.style.background = '#d4edda';

  setTimeout(()=>{
    elemento.style.background = '#f1f1f1';
  },300);
}

}

/* ===============================
   PDF
================================= */

function gerarPDF(){
html2pdf().from(document.getElementById('conteudo')).save();
}

/* ===============================
   INICIAR
================================= */

document.addEventListener("DOMContentLoaded", ()=>{
document.getElementById('data').valueAsDate = new Date();
gerarFormulario();
});

</script>
