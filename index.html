<script>
document.addEventListener('DOMContentLoaded', () => {

  /* BANCO DE FRASES PRONTAS */
  const banco = {
    explicito: [
      "Professor apresentou os objetivos no quadro no início da aula.",
      "Docente explicou claramente o que os alunos deveriam aprender antes de iniciar a atividade."
    ],
    implicito: [
      "As atividades estavam alinhadas ao conteúdo esperado, mesmo sem explicitação direta.",
      "Professor iniciou diretamente com exercícios coerentes com a aprendizagem proposta."
    ],
    nao: [
      "Professor iniciou a aula sem apresentar o que seria aprendido.",
      "Não houve clareza sobre o propósito das atividades propostas."
    ]
  };

  let opcaoAtual = null;

  /* FUNÇÃO PRINCIPAL */
  window.selecionarOpcao = function(tipo) {

    const lista = document.getElementById('lista');
    const box   = document.getElementById('box');
    const texto = document.getElementById('texto');

    // ✅ Segurança extra
    if (!lista || !box || !texto) {
      console.error('Elementos do formulário não encontrados no HTML.');
      return;
    }

    // Fecha se clicar na mesma opção
    if (opcaoAtual === tipo) {
      lista.innerHTML = '';
      box.classList.add('hidden');
      opcaoAtual = null;
      return;
    }

    opcaoAtual = tipo;
    lista.innerHTML = '';

    banco[tipo].forEach(frase => {

      const div = document.createElement('div');
      div.className = 'opcao';
      div.textContent = frase;

      div.addEventListener('click', () => {

        document
          .querySelectorAll('#lista .opcao')
          .forEach(el => el.style.background = '#e8f0fe');

        div.style.background = '#bcd4ff';

        texto.value += (texto.value ? '\n' : '') + '- ' + frase;

        box.classList.remove('hidden');
        box.scrollIntoView({ behavior: 'smooth' });
      });

      lista.appendChild(div);
    });
  };

  /* FUNÇÃO DE SUGESTÕES EXTRAS */
  window.mostrarSugestoes = function() {

    const div = document.getElementById('sugestoes');
    const texto = document.getElementById('texto');

    if (!div || !texto) return;

    div.innerHTML = '';

    for (let i = 1; i <= 20; i++) {

      const el = document.createElement('div');
      el.className = 'opcao';
      el.textContent = 'Sugestão complementar ' + i;

      el.addEventListener('click', () => {
        texto.value += '\n- ' + el.textContent;
      });

      div.appendChild(el);
    }
  };

});
</script>
``
