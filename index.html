<script>

/* BANCO DE FRASES PRONTAS */
const banco = {

explicito:[
"Professor apresentou os objetivos no quadro no início da aula.",
"Docente explicou claramente o que os alunos deveriam aprender antes de iniciar a atividade."
],

implicito:[
"As atividades estavam alinhadas ao conteúdo esperado, mesmo sem explicitação direta.",
"Professor iniciou diretamente com exercícios coerentes com a aprendizagem proposta."
],

nao:[
"Professor iniciou a aula sem apresentar o que seria aprendido.",
"Não houve clareza sobre o propósito das atividades propostas."
]

};

/* 🔥 ALTERAÇÃO: variável para controlar menu aberto */
let opcaoAtual = null;

/* 🔥 ALTERAÇÃO: função única (removida duplicação) */
function selecionarOpcao(tipo){

  const lista = document.getElementById('lista');
  const box = document.getElementById('box');

  /* 🔥 ALTERAÇÃO: se clicar novamente, FECHA */
  if(opcaoAtual === tipo){
    lista.innerHTML = '';           // limpa lista
    box.classList.add('hidden');    // esconde caixa
    opcaoAtual = null;              // reseta controle
    return;                         // interrompe execução
  }

  /* 🔥 ALTERAÇÃO: atualiza estado */
  opcaoAtual = tipo;

  // Limpa lista anterior
  lista.innerHTML = '';

  // Carrega novas opções
  banco[tipo].forEach(frase => {

    const div = document.createElement('div');
    div.className = 'opcao';
    div.innerText = frase;

    div.onclick = () => {

      document.querySelectorAll('#lista .opcao')
      .forEach(el => el.style.background='#e8f0fe');

      div.style.background = '#bcd4ff';

      let campo = document.getElementById('texto');

      if(campo.value === ''){
        campo.value = '- ' + frase;
      } else {
        campo.value += '\n- ' + frase;
      }

      box.classList.remove('hidden');

      box.scrollIntoView({behavior:'smooth'});
    };

    lista.appendChild(div);
  });
}

/* FUNÇÃO PARA MOSTRAR SUGESTÕES EXTRAS */
function mostrarSugestoes(){

  const div = document.getElementById('sugestoes');
  div.innerHTML = '';

  for(let i=1;i<=20;i++){

    let el = document.createElement('div');

    el.className = 'opcao';
    el.innerText = 'Sugestão complementar ' + i;

    el.onclick = () => {
      document.getElementById('texto').value += ' ' + el.innerText;
    };

    div.appendChild(el);
  }
}

</script>
